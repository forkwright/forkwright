# Forge CI pipeline for forkwright/forkwright (GitHub profile README).
#
# This is a docs-only repo — no Cargo.toml, no Rust workspace. The
# default Rust gate (fmt → check → clippy → nextest → lint) has nothing
# to build here. Ship a single trivial checkout-ok stage so forge CI
# completes with Pass on every push without attempting cargo commands.
#
# Mirrors the dioptron pattern from Phase 05e cutover (see
# forkwright/dioptron#1 and kanon#8).

[pipeline]
stages = ["checkout-ok"]

[stages."checkout-ok"]
cmd = "true"
timeout_secs = 60

[verifier]
enabled = false
